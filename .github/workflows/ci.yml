name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # perl, prove, shellcheck and the core modules the tests use
      # (Test::More, File::Temp, FindBin, Digest::SHA) ship with the runner.
      - name: Tool versions
        run: |
          perl --version | sed -n '2p'
          shellcheck --version | sed -n '2p'

      - name: Perl syntax check
        run: |
          perl -c lib/PVE/LXC/BindSnap.pm
          perl -c lib/PVE/API2/LXC.wrapper.pm

      - name: Unit tests
        run: prove -I lib t/

      # The repo is also a single-plugin Claude Code marketplace shipping the
      # proxmox-bindsnap skill. Keep the manifests valid JSON and the skill present.
      - name: Validate plugin manifests and skill
        run: |
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null
          python3 -m json.tool .claude-plugin/plugin.json > /dev/null
          test -f skills/proxmox-bindsnap/SKILL.md
          head -1 skills/proxmox-bindsnap/SKILL.md | grep -qx -- '---'

      - name: Shellcheck
        run: shellcheck install.sh uninstall.sh

      # shfmt is not preinstalled on the runner; fetch a pinned release binary.
      - name: Shfmt
        run: |
          curl -fsSL https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64 -o shfmt
          chmod +x shfmt
          ./shfmt -i 4 -d install.sh uninstall.sh
